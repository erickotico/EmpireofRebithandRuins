<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/beguinnersguide.css"> <!-- Adicionando CSS específico -->
    <title>Guia para Iniciantes</title>
</head>
<body>
    <header>
        <div class="brand">
            <img src="./img/LogoRPG.jpg" alt="Logo do jogo">
            <h1>Guia Para Iniciantes</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="bestiario.html">Bestiário</a></li>
                <li><a href="classes.html">Classes</a></li>
                <li><a href="sobre.html">Sobre</a></li>
               
            </ul>
        </nav>
    </header>
        <!-- Imagem do mapa -->
    <section id="mapa">
        <h2>Mapa do Jogo</h2>
        <img id="mapa-img" src="img/LogoRPG.jpg" alt="Mapa do Jogo" onclick="abrirPopup()">
    </section>

    <!-- Popup para imagem ampliada -->
    <div id="popup" class="popup">
        <span class="fechar">&times;</span>
        <img id="popup-img" src="img/LogoRPG.jpg" alt="Mapa Ampliada">
    </div>

    <!-- Seção de Reinos -->
    <section id="reinos">
        <h2>Reinos</h2>
        <div class="search-container">
            <input type="text" id="filtro-reinos" placeholder="Buscar reinos...">
            <button onclick="filtrarReinos(document.getElementById('filtro-reinos').value)">Pesquisar</button>
        </div>
        <div id="lista-reinos" class="scroll-box"></div>
    </section>

    <!-- Seção de Masmorras -->
    <section id="masmorras">
        <h2>Tipos de Masmorras</h2>
        <div class="search-container">
            <input type="text" id="filtro-masmorras" placeholder="Buscar masmorras...">
            <button onclick="filtrarMasmorras(document.getElementById('filtro-masmorras').value)">Pesquisar</button>
        </div>
        <div id="lista-masmorras" class="scroll-box"></div>
    </section>

    <!-- Seção de Itens -->
    <section id="itens">
        <h2>Itens</h2>
        <div class="search-container">
            <input type="text" id="filtro-itens" placeholder="Buscar itens...">
            <button onclick="filtrarItens(document.getElementById('filtro-itens').value)">Pesquisar</button>
        </div>
        <div id="lista-itens" class="scroll-box"></div>
    </section>

    <script src="js/beguinnersguide.js"></script>
</body>
</html>
