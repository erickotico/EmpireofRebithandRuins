<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/beguinnersguide.css"> 
    <title>Guia para Iniciantes</title>
</head>
<body>
    <header>
        <div class="brand">
            <img src="./img/LogoRPG.jpg" alt="Game logo">
            <h1>Beginner's Guide</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="bestiario.html">Bestiary</a></li>
                <li><a href="classes.html">Classes</a></li>
                <li><a href="sobre.html">About</a></li>
            </ul>
        </nav>
        <div class="header-actions">
            <button class="lang-switcher" type="button" aria-label="Change page language" title="Change language">🌐</button>
        </div>
    </header>
        <!-- Game map -->
    <section id="mapa">
        <h2>Game Map</h2>
        <img id="mapa-img" src="img/LogoRPG.jpg" alt="Game map" onclick="abrirPopup()">
    </section>

    <!-- Popup para imagem ampliada -->
    <div id="popup" class="popup">
        <span class="fechar">&times;</span>
        <img id="popup-img" src="img/LogoRPG.jpg" alt="Mapa Ampliada">
    </div>

    <!-- Kingdom section -->
    <section id="reinos">
        <h2>Kingdoms</h2>
        <div class="search-container">
            <input type="text" id="filtro-reinos" placeholder="Search kingdoms...">
            <button onclick="filtrarReinos(document.getElementById('filtro-reinos').value)">Search</button>
        </div>
        <div id="lista-reinos" class="scroll-box"></div>
    </section>

    <!-- Dungeon section -->
    <section id="masmorras">
        <h2>Dungeon Types</h2>
        <div class="search-container">
            <input type="text" id="filtro-masmorras" placeholder="Search dungeons...">
            <button onclick="filtrarMasmorras(document.getElementById('filtro-masmorras').value)">Search</button>
        </div>
        <div id="lista-masmorras" class="scroll-box"></div>
    </section>

    <!-- Items section -->
    <section id="itens">
        <h2>Items</h2>
        <div class="search-container">
            <input type="text" id="filtro-itens" placeholder="Search items...">
            <button onclick="filtrarItens(document.getElementById('filtro-itens').value)">Search</button>
        </div>
        <div id="lista-itens" class="scroll-box"></div>
    </section>

    <script src="js/langSwitcher.js"></script>
    <script src="js/beguinnersguide.js"></script>
</body>
</html>
